name: Deploy Next.js Frontend to EC2

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Important for Next.js if using git-based features

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'   # Next.js 14+ recommends Node 20
          cache: 'npm'         # or 'pnpm' / 'yarn' if you use those

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js app
        run: npm run build
        env:
          # Pass any required env vars for build time (optional)
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          # Add more NEXT_PUBLIC_ vars as needed

      - name: Upload build artifacts to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: ".next/, public/, next.config.js"   # Only upload what's needed
          target: "/home/ubuntu/nextjs-build/"
          overwrite: true
          strip_components: 0

      - name: Deploy to Nginx + Restart PM2 (or standalone server)
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Option A: If you're running Next.js with standalone mode + PM2
            sudo rsync -av --delete /home/ubuntu/nextjs-build/ /var/www/nextjs/
            sudo chown -R www-data:www-data /var/www/nextjs
            cd /var/www/nextjs
            pm2 restart nextjs-app || pm2 start "npx next start -p 3000" --name nextjs-app

            # Option B: If you're using standalone output + serving via nginx proxy
            # sudo cp -r /home/ubuntu/nextjs-build/.next/standalone/* /var/www/nextjs/
            # sudo cp -r /home/ubuntu/nextjs-build/.next/static /var/www/nextjs/.next/
            # sudo cp -r /home/ubuntu/nextjs-build/public /var/www/nextjs/
            # pm2 restart nextjs-app

            sudo systemctl reload nginx
            rm -rf /home/ubuntu/nextjs-build
            echo "Next.js deployed successfully at $(date)"